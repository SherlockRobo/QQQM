<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>QQQM 估值中心 V2.0 - 回本周期版</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --blue: #2f81f7; --green: #3fb950; --red: #f85149; --border: #30363d; --gold: #ffd700; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1200px; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .panel { background: var(--card); padding: 24px; border-radius: 12px; border: 1px solid var(--border); }
        .metric-card { background: var(--card); padding: 24px; border-radius: 14px; text-align: center; border: 1px solid var(--border); border-top: 5px solid var(--blue); }
        .val { font-size: 2.5rem; font-weight: 800; margin-bottom: 5px; }
        .sub { color: #8b949e; font-size: 0.9rem; }
        .input-group { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        input { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 8px; width: 90px; text-align: right; border-radius: 6px; }
        .timer-box { background: rgba(255, 215, 0, 0.05); border: 1px solid var(--gold); padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center;">🚀 QQQM 火控中心 V2.0 <span style="font-weight:300; opacity:0.6;">回本周期版</span></h1>
    <div class="grid">
        <div class="panel">
            <h3 style="color:var(--blue)">📊 盈利引擎设定</h3>
            <div class="input-group"><label>每股净资产 (TNAV $)</label><input type="number" id="tnav" value="19.74" oninput="calc()"></div>
            <div class="input-group"><label>当前 ROE (%)</label><input type="number" id="roe" value="32.92" oninput="calc()"></div>
            <div class="input-group"><label>预计年化增长 (%)</label><input type="number" id="growth" value="12.0" oninput="calc()"></div>
            <div class="input-group"><label>锚定历史 PE</label><input type="number" id="hist_pe" value="30.14" oninput="calc()"></div>
        </div>
        <div class="panel" style="border-top: 3px solid var(--gold);">
            <h3 style="color:var(--gold)">⚡ 高位入场压力测试</h3>
            <div class="input-group"><label>买入价格 ($)</label><input type="number" id="buy_price" value="250.00" oninput="calc()" style="color:var(--gold); font-weight:bold;"></div>
            <div class="timer-box">
                <div class="sub">预计回本/价值对齐周期</div>
                <div class="val" id="out_years" style="color:var(--gold)">2.2 年</div>
                <div class="sub" id="timer_desc">靠盈利增长抵消估值回归</div>
            </div>
        </div>
    </div>
    <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
        <div class="metric-card"><h3>实时 EPS</h3><div class="val" id="out_eps">$ 0.00</div></div>
        <div class="metric-card" style="border-top-color:var(--red)"><h3>当前估值溢价</h3><div class="val" id="out_premium" style="color:var(--red)">+0%</div></div>
        <div class="metric-card" style="border-top-color:var(--green)"><h3>安全买入价</h3><div class="val" id="out_fair" style="color:var(--green)">$ 0.00</div></div>
    </div>
</div>
<script>
    function calc() {
        const tnav = parseFloat(document.getElementById('tnav').value) || 19.74;
        const roe = parseFloat(document.getElementById('roe').value) || 32.92;
        const growth = parseFloat(document.getElementById('growth').value) / 100;
        const histPe = parseFloat(document.getElementById('hist_pe').value) || 30.14;
        const buyPrice = parseFloat(document.getElementById('buy_price').value) || 250;

        const eps = tnav * (roe / 100);
        document.getElementById('out_eps').innerText = "$ " + eps.toFixed(2);
        
        const fairPrice = eps * histPe;
        document.getElementById('out_fair').innerText = "$ " + fairPrice.toFixed(2);
        
        const premium = ((buyPrice - fairPrice) / fairPrice) * 100;
        document.getElementById('out_premium').innerText = "+" + premium.toFixed(1) + "%";

        // n = log(BuyPrice / (EPS * HistPE)) / log(1 + growth)
        const n = Math.log(buyPrice / (eps * histPe)) / Math.log(1 + growth);
        const outYears = document.getElementById('out_years');
        outYears.innerText = n > 0 ? n.toFixed(1) + " 年" : "已在价值区";
        
        document.getElementById('timer_desc').innerText = n > 0 ? `在此期间需忍受估值下杀风险` : `当前价格极具安全边际`;
    }
    window.onload = calc;
</script>
</body>
</html>
