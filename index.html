<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQQM 估值火控中心 V1.9 - 全参数战略版</title>
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --text-color: #e6edf3;
            --nasdaq-blue: #2f81f7; --green: #3fb950; --yellow: #d29922; --red: #f85149; --border: #30363d; --cyan: #58a6ff; --purple: #bc8cff; --gold: #ffd700;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1200px; width: 100%; }
        header { text-align: center; padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
        
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .panel { background-color: var(--card-bg); padding: 24px; border-radius: 12px; border: 1px solid var(--border); }
        .panel-title { color: var(--nasdaq-blue); font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; font-weight: 600; }
        
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .input-group label { font-size: 0.85rem; color: #8b949e; }
        .input-group input, .input-group select { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 6px; width: 105px; text-align: right; font-size: 1rem; }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: var(--card-bg); padding: 24px; border-radius: 14px; text-align: center; border: 1px solid var(--border); border-top: 5px solid var(--nasdaq-blue); }
        .metric { font-size: 2.4rem; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .metric-sub { font-size: 0.85rem; color: #8b949e; background: #0d1117; padding: 4px 10px; border-radius: 12px; }

        .water-level-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .water-level-table th, .water-level-table td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); }
        .water-level-table th { background: #010409; color: var(--nasdaq-blue); font-size: 0.8rem; }
        .light { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .light-green { background: var(--green); }
        .light-yellow { background: var(--yellow); }
        .light-red { background: var(--red); }
        .current-row { background: rgba(47, 129, 247, 0.1); outline: 1px solid var(--nasdaq-blue); }
        .target-row { background: rgba(255, 215, 0, 0.05); outline: 1px dashed var(--gold); }

        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .compare-item { background: #0d1117; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .compare-label { font-size: 0.75rem; color: #8b949e; margin-bottom: 4px; }
        .compare-val { font-size: 1.1rem; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 QQQM 火控中心 V1.9 <span style="font-weight:300; opacity:0.6;">全参数战略版</span></h1>
        <p style="color:#8b949e; margin-top:5px;">实时追踪 ROE 盈利引擎与战略买入对比</p>
    </header>

    <div class="grid-layout">
        <div class="panel">
            <div class="panel-title">📊 第一步：核心资产与盈利效率</div>
            <div class="input-group">
                <label>每股净资产 (TNAV $)</label>
                <input type="number" id="in_tnav" value="19.74" step="0.01" oninput="calculate()">
            </div>
            <div class="input-group">
                <label style="color:var(--cyan); font-weight:bold;">当前 ROE 强度 (%)</label>
                <input type="number" id="in_roe" value="32.92" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label style="color:var(--purple);">最新 SEC 股息率 (%)</label>
                <input type="number" id="in_div" value="0.51" step="0.01" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>预期年化增长 (%)</label>
                <input type="number" id="in_growth" value="12.0" step="0.1" oninput="calculate()">
            </div>
            <div style="margin-top: 15px; font-size: 0.85rem; color: #8b949e; text-align: center; background: #010409; padding: 8px; border-radius: 6px;">
                推算每股盈利 (EPS): <strong id="out_eps" style="color:#fff;">$ 6.50</strong>
            </div>
        </div>

        <div class="panel" style="border-top: 3px solid var(--gold);">
            <div class="panel-title" style="color:var(--gold)">⚡ 第二步：拟买入价与期望回报</div>
            <div class="input-group">
                <label style="color:var(--gold); font-weight:bold;">你的拟买入价格 ($)</label>
                <input type="number" id="proposed_price" value="200.00" oninput="calculate()" style="border-color:var(--gold); color:var(--gold); font-weight:bold;">
            </div>
            <div class="input-group">
                <label>要求回报率 / 折现率 (%)</label>
                <input type="number" id="target_ret" value="10.0" oninput="calculate()">
            </div>
            <div class="compare-grid">
                <div class="compare-item">
                    <div class="compare-label">对比市场现价</div>
                    <div id="gap_market" class="compare-val">-20.0%</div>
                </div>
                <div class="compare-item">
                    <div class="compare-label">对比折现合理价</div>
                    <div id="gap_fair" class="compare-val">-16.3%</div>
                </div>
                <div class="compare-item">
                    <div class="compare-label">对比 5Y 中枢价</div>
                    <div id="gap_hist" class="compare-val">+2.1%</div>
                </div>
                <div class="compare-item">
                    <div class="compare-label">拟入场 PE</div>
                    <div id="proposed_pe" class="compare-val">30.8</div>
                </div>
            </div>
        </div>
    </div>

    <div class="metrics-grid">
        <div class="card" style="border-top-color: var(--purple);">
            <h3>折现理论合理价</h3>
            <div class="metric" id="out_fair_price">$ 0.00</div>
            <div class="metric-sub">基于 <span id="txt_ret">10</span>% 要求回报</div>
        </div>
        <div class="card" style="border-top-color: var(--nasdaq-blue);">
            <h3>市场实时水位</h3>
            <div class="metric" id="out_real_pe">38.5</div>
            <div class="input-group" style="justify-content:center; margin-top:10px;">
                <input type="number" id="current_price" value="250.00" oninput="calculate()" style="width:110px; text-align:center; font-size:1.1rem;">
            </div>
        </div>
        <div class="card" style="border-top-color: var(--green);">
            <h3>预期全收益 (Total)</h3>
            <div class="metric" id="out_total_yield">12.51%</div>
            <div class="metric-sub">增长 + 股息收益</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">🚥 综合估值水位探测器 (锚定 5Y PE 30.1)</div>
        <table class="water-level-table">
            <thead>
                <tr>
                    <th>估值阶段</th>
                    <th>对应 PE</th>
                    <th>对应价格</th>
                    <th>ROE 偏离分析</th>
                </tr>
            </thead>
            <tbody id="water_body"></tbody>
        </table>
    </div>
</div>

<script>
    const PE_5Y = 30.14; 
    const ROE_5Y = 31.0; 

    function calculate() {
        const tnav = parseFloat(document.getElementById('in_tnav').value) || 19.74;
        const roe = parseFloat(document.getElementById('in_roe').value) || 32.92;
        const divYield = parseFloat(document.getElementById('in_div').value) || 0.51;
        const growth = parseFloat(document.getElementById('in_growth').value) / 100;
        const targetRet = parseFloat(document.getElementById('target_ret').value) / 100;
        const currentPrice = parseFloat(document.getElementById('current_price').value) || 250;
        const proposedPrice = parseFloat(document.getElementById('proposed_price').value) || 200;

        // 1. 推算 EPS
        const eps = tnav * (roe / 100);
        document.getElementById('out_eps').innerText = "$ " + eps.toFixed(2);
        document.getElementById('txt_ret').innerText = (targetRet * 100).toFixed(1);

        // 2. 核心定价
        const fairPrice = (eps * (1 + growth) * PE_5Y) / (1 + targetRet);
        document.getElementById('out_fair_price').innerText = "$ " + fairPrice.toFixed(2);
        
        const realPe = currentPrice / eps;
        document.getElementById('out_real_pe').innerText = realPe.toFixed(1);

        // 3. 差异比例分析
        const gapMarket = ((proposedPrice - currentPrice) / currentPrice) * 100;
        const gapFair = ((proposedPrice - fairPrice) / fairPrice) * 100;
        const gapHist = ((proposedPrice - (eps * PE_5Y)) / (eps * PE_5Y)) * 100;
        const proposedPe = proposedPrice / eps;

        const updateGap = (id, val) => {
            const el = document.getElementById(id);
            el.innerText = (val > 0 ? "+" : "") + val.toFixed(1) + "%";
            el.style.color = val < 0 ? "var(--green)" : "var(--red)";
        };
        updateGap('gap_market', gapMarket);
        updateGap('gap_fair', gapFair);
        updateGap('gap_hist', gapHist);
        document.getElementById('proposed_pe').innerText = proposedPe.toFixed(1);

        // 4. 全收益
        document.getElementById('out_total_yield').innerText = ((growth * 100) + divYield).toFixed(2) + "%";

        // 5. 水位表
        const roeGap = ((roe - ROE_5Y) / ROE_5Y) * 100;
        const peLevels = [
            { label: "10Y 保守中枢", pe: 26.72, desc: "回归位" },
            { label: "5Y 均衡均值", pe: 30.14, desc: "合理区" },
            { label: "拟定买入位", pe: proposedPe.toFixed(1), isProposed: true },
            { label: "3Y 激进运行", pe: 32.50, desc: "溢价位" },
            { label: "当前市场位", pe: realPe.toFixed(1), isCurrent: true },
            { label: "25 财报顶点", pe: 41.57, desc: "极度危险" }
        ];
        peLevels.sort((a, b) => a.pe - b.pe);

        const tbody = document.getElementById('water_body');
        tbody.innerHTML = "";
        peLevels.forEach(item => {
            const price = eps * item.pe;
            const tr = document.createElement('tr');
            if(item.isCurrent) tr.className = "current-row";
            if(item.isProposed) tr.className = "target-row";
            
            let lColor = item.pe < 31 ? "light-green" : (item.pe < 36 ? "light-yellow" : "light-red");
            tr.innerHTML = `
                <td><span class="light ${lColor}"></span>${item.label}</td>
                <td>${item.pe}</td>
                <td style="font-weight:bold;">$ ${price.toFixed(2)}</td>
                <td style="font-size:0.8rem;">${roeGap > 0 ? '效率增强 +' + roeGap.toFixed(1) + '%' : '效率减弱'}</td>
            `;
            tbody.appendChild(tr);
        });
    }
    window.onload = calculate;
</script>
</body>
</html>
