<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>QQQM 估值中心 V2.1 - 5年战略版</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --blue: #2f81f7; --green: #3fb950; --red: #f85149; --border: #30363d; --gold: #ffd700; --purple: #bc8cff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1200px; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .panel { background: var(--card); padding: 24px; border-radius: 12px; border: 1px solid var(--border); }
        .metric-card { background: var(--card); padding: 24px; border-radius: 14px; text-align: center; border: 1px solid var(--border); border-top: 5px solid var(--blue); }
        .val { font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; }
        .sub { color: #8b949e; font-size: 0.85rem; }
        .input-group { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        input { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 8px; width: 95px; text-align: right; border-radius: 6px; }
        .forecast-box { background: rgba(47, 129, 247, 0.05); border: 1px solid var(--blue); padding: 20px; border-radius: 12px; margin-top: 20px; }
        .forecast-row { display: flex; justify-content: space-around; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center;">🚀 QQQM 火控中心 V2.1 <span style="font-weight:300; opacity:0.6;">5年战略展望版</span></h1>
    
    <div class="grid">
        <div class="panel">
            <h3 style="color:var(--blue)">⚙️ 核心参数设定</h3>
            <div class="input-group"><label>每股净资产 (TNAV $)</label><input type="number" id="tnav" value="19.74" oninput="calc()"></div>
            <div class="input-group"><label>当前 ROE (%)</label><input type="number" id="roe" value="32.92" oninput="calc()"></div>
            <div class="input-group"><label>预计年化增长 (%)</label><input type="number" id="growth" value="12.0" oninput="calc()"></div>
            <div class="input-group"><label>5Y 均值 PE 锚点</label><input type="number" id="hist_pe" value="30.14" oninput="calc()"></div>
            <div class="input-group"><label style="color:var(--gold)">当前买入价 ($)</label><input type="number" id="buy_price" value="250.00" oninput="calc()"></div>
        </div>

        <div class="panel" style="border-top: 3px solid var(--purple);">
            <h3 style="color:var(--purple)">🔭 5 年持仓愿景推演</h3>
            <div class="forecast-box">
                <div class="sub">5年后预期每股盈利 (EPS)</div>
                <div class="val" id="future_eps" style="color:var(--purple)">$ 11.45</div>
                <div class="forecast-row">
                    <div>
                        <div class="sub">回归均值(30x)股价</div>
                        <div id="price_bear" style="font-size:1.4rem; font-weight:700;">$ 345</div>
                    </div>
                    <div>
                        <div class="sub">估值维持(38x)股价</div>
                        <div id="price_bull" style="font-size:1.4rem; font-weight:700;">$ 441</div>
                    </div>
                </div>
            </div>
            <div style="margin-top:15px; font-size:0.85rem; color:var(--green); text-align:center;">
                ✅ 5年后预计累计派息: <strong id="out_total_div">$ 7.21</strong>
            </div>
        </div>
    </div>

    <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
        <div class="metric-card" style="border-top-color:var(--gold)">
            <h3>要求回报率 (10%)</h3>
            <div class="val" id="out_fair">$ 199.50</div>
            <div class="sub">此价格入场可满分达标</div>
        </div>
        <div class="metric-card" style="border-top-color:var(--purple)">
            <h3>5年预期年化收益</h3>
            <div class="val" id="out_ann_ret">6.6%</div>
            <div class="sub">已计入估值回归均值的损耗</div>
        </div>
        <div class="metric-card" style="border-top-color:var(--blue)">
            <h3>实时溢价率</h3>
            <div class="val" id="out_premium">+25%</div>
            <div class="sub">对比5年均值水位</div>
        </div>
    </div>
</div>

<script>
    function calc() {
        const tnav = parseFloat(document.getElementById('tnav').value) || 19.74;
        const roe = parseFloat(document.getElementById('roe').value) || 32.92;
        const growth = parseFloat(document.getElementById('growth').value) / 100;
        const histPe = parseFloat(document.getElementById('hist_pe').value) || 30.14;
        const buyPrice = parseFloat(document.getElementById('buy_price').value) || 250;
        const divRate = 0.51 / 100; //

        const eps = tnav * (roe / 100);
        const realPe = buyPrice / eps;
        const futureEps = eps * Math.pow(1 + growth, 5);
        
        document.getElementById('future_eps').innerText = "$ " + futureEps.toFixed(2);
        
        const pBear = futureEps * histPe;
        const pBull = futureEps * realPe;
        document.getElementById('price_bear').innerText = "$ " + Math.round(pBear);
        document.getElementById('price_bull').innerText = "$ " + Math.round(pBull);

        // 年化回报计算 (考虑到5年后回归均值的情况)
        const totalRet = (pBear / buyPrice);
        const annRet = (Math.pow(totalRet, 1/5) - 1) * 100;
        document.getElementById('out_ann_ret').innerText = annRet.toFixed(1) + "%";

        document.getElementById('out_premium').innerText = "+" + (((realPe - histPe)/histPe)*100).toFixed(0) + "%";
        document.getElementById('out_fair').innerText = "$ " + ((eps * (1+growth) * histPe) / 1.1).toFixed(2);
        
        // 估算5年总股息 (简化版)
        document.getElementById('out_total_div').innerText = "$ " + (eps * 5 * 1.3 * divRate * 10).toFixed(2);
    }
    window.onload = calc;
</script>
</body>
</html>
