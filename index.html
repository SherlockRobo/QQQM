<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQQM 估值中心 V1.6 - 估值水位红绿灯</title>
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --text-color: #e6edf3;
            --nasdaq-blue: #2f81f7; --green: #3fb950; --yellow: #d29922; --red: #f85149; --border: #30363d; --cyan: #58a6ff; --purple: #bc8cff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1100px; width: 100%; }
        header { text-align: center; padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
        
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .panel { background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .panel-title { color: var(--nasdaq-blue); font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; font-weight: 600; }
        
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .input-group label { font-size: 0.85rem; color: #8b949e; }
        .input-group input { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 6px; width: 100px; text-align: right; font-size: 1rem; }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: var(--card-bg); padding: 24px; border-radius: 14px; text-align: center; border: 1px solid var(--border); border-top: 5px solid var(--nasdaq-blue); }
        .metric { font-size: 2.4rem; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .metric-sub { font-size: 0.85rem; color: #8b949e; }

        /* 水位表样式 */
        .water-level-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .water-level-table th, .water-level-table td { padding: 14px; text-align: center; border-bottom: 1px solid var(--border); }
        .water-level-table th { background: #010409; color: var(--nasdaq-blue); font-size: 0.85rem; text-transform: uppercase; }
        .light { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .light-green { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .light-yellow { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
        .light-red { background: var(--red); box-shadow: 0 0 10px var(--red); }
        
        .current-row { background: rgba(47, 129, 247, 0.1); border: 2px solid var(--nasdaq-blue); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 QQQM 火控中心 V1.6 <span style="font-weight:300; opacity:0.6;">水位红绿灯版</span></h1>
        <p style="color:#8b949e; margin-top:5px;">当前实时价格: $ <span id="header_price">250.00</span></p>
    </header>

    <div class="grid-layout">
        <div class="panel">
            <div class="panel-title">📊 实时基本面锚点</div>
            <div class="input-group"><label>财报发布股价</label><input type="number" id="base_price" value="218.45" oninput="calculate()"></div>
            <div class="input-group"><label>财报滚动 PE</label><input type="number" id="base_pe" value="33.62" oninput="calculate()"></div>
            <div style="margin-top: 15px; font-size: 0.85rem; color: #8b949e;">* 自动推算 EPS: <strong id="out_eps" style="color:#fff;">$6.50</strong></div>
        </div>

        <div class="panel" style="border-top: 3px solid var(--yellow);">
            <div class="panel-title" style="color:var(--yellow)">⚡ 价格压力测试</div>
            <div class="input-group">
                <label>要求回报率 (%)</label>
                <input type="number" id="target_ret" value="10.0" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>市场实时价 ($)</label>
                <input type="number" id="current_price" value="250.00" oninput="calculate()" style="color:var(--yellow); font-weight:bold;">
            </div>
        </div>
    </div>

    <div class="panel" style="margin-bottom: 20px;">
        <div class="panel-title">🚥 估值水位探测器 (基于 EPS $6.50)</div>
        <table class="water-level-table">
            <thead>
                <tr>
                    <th>估值状态</th>
                    <th>对应 PE</th>
                    <th>对应价格</th>
                    <th>建议操作</th>
                </tr>
            </thead>
            <tbody id="water_body">
                </tbody>
        </table>
    </div>

    <div style="font-size: 0.85rem; color: #6e7681; background: #010409; padding: 15px; border-radius: 8px;">
        💡 <strong>红绿灯逻辑：</strong> <br>
        🟢 <strong>绿色 (PE < 30)：</strong> 处于 5-10 年历史均值区，极具性价比。<br>
        🟡 <strong>黄色 (PE 30-35)：</strong> 处于 3 年历史高效率运行区，合理但无厚保护。<br>
        🔴 <strong>红色 (PE > 35)：</strong> 处于情绪狂热期，溢价显著，谨防回撤。
    </div>
</div>

<script>
    function calculate() {
        const bp = parseFloat(document.getElementById('base_price').value);
        const bpe = parseFloat(document.getElementById('base_pe').value);
        const cp = parseFloat(document.getElementById('current_price').value);
        
        const eps = bp / bpe;
        document.getElementById('out_eps').innerText = "$" + eps.toFixed(2);
        document.getElementById('header_price').innerText = cp.toFixed(2);

        const peLevels = [
            { label: "10Y 保守中枢", pe: 26.72, desc: "绝对击球区" }, //
            { label: "5Y 均衡均值", pe: 30.14, desc: "舒适定投区" }, //
            { label: "3Y 激进运行", pe: 32.50, desc: "溢价观察区" }, //
            { label: "26/01 财报位", pe: 33.62, desc: "近期高位" }, //
            { label: "当前情绪位", pe: (cp / eps).toFixed(1), desc: "估值透支", isCurrent: true },
            { label: "25 财报顶点", pe: 41.57, desc: "极度危险区" } // 
        ];

        // 按 PE 排序
        peLevels.sort((a, b) => a.pe - b.pe);

        const tbody = document.getElementById('water_body');
        tbody.innerHTML = "";

        peLevels.forEach(item => {
            const price = eps * item.pe;
            const tr = document.createElement('tr');
            if(item.isCurrent) tr.className = "current-row";

            let lightClass = "light-red";
            if(item.pe < 31) lightClass = "light-green";
            else if(item.pe < 36) lightClass = "light-yellow";

            tr.innerHTML = `
                <td style="text-align:left;"><span class="light ${lightClass}"></span>${item.label}</td>
                <td>${item.pe}</td>
                <td style="font-weight:bold; color:#fff;">$ ${price.toFixed(2)}</td>
                <td style="font-size:0.85rem;">${item.desc}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.onload = calculate;
</script>
</body>
</html>
